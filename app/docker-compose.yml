services:
  api:
    build: ./backend
    container_name: pump-detect-api
    environment:
      ARTIFACT_DIR: /app/artifacts
      ALERT_THRESHOLD: "0.5"
      WINDOW_SIZE: "20"
      HORIZON: "10"
      UPLOAD_TMP_DIR: /tmp/pump_detect_uploads
    volumes:
      - ./backend/artifacts:/app/artifacts:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).status==200 else sys.exit(1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build: ./frontend
    container_name: pump-detect-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
