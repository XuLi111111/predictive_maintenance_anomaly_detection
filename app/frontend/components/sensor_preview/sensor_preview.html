

<!-- Chart.js from CDN - move this to the static page head if needed -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- wrapper is hidden until JS shows it after file upload -->
<div class="sensor-preview-wrap" id="sensorPreviewWrap" style="display: none;">

  <div class="divider"></div>

  <div class="sec-eyebrow">— sensor signal preview</div>

  <div class="sensor-preview-card">

    <!-- title on the left, sensor/row count badge on the right -->
    <div class="sp-head">
      <div class="sp-title">Uploaded sensor readings</div>
      <div class="sp-badge" id="spBadge">8 sensors · — rows</div>
    </div>

    <!-- Chart.js renders the line chart into this canvas -->
    <div class="sp-chart-wrap">
      <canvas id="sensorChart"></canvas>
    </div>

    <!-- reminder at the bottom so users know what to look for -->
    <div class="sp-foot">
      Showing all sensor channels from your uploaded file.
      Check for flat lines or missing data before running prediction.
    </div>

  </div>

</div>
